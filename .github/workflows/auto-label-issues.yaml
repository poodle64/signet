# Auto-Label Issues
#
# Thin caller that delegates to the reusable workflow in master-project.
#
# Prerequisites (configured on this repo):
#   - Default labels removed: "good first issue", "help wanted"
#   - Priority labels created: priority:low, priority:medium, priority:high

name: Auto-Label Issues

on:
  issues:
    types: [opened]

jobs:
  auto-label:
    uses: poodle64/master-project/.github/workflows/auto-label-issues.yaml@main
    secrets: inherit

# Test gate on every PR and push to main.
#
# signet is a cgo binary (Secure Enclave Swift shim on macOS, go-piv/PC-SC on
# Linux), so tests run natively per platform — the same matrix rationale as
# release.yaml. Hardware-gated tests (SIGNET_PIV_HW_TEST) and the tpmsimulator
# build tag are excluded by default, so `make test` is hardware-free.
name: ci

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'internal/signer/enclave.swift'
      - '.github/workflows/ci.yaml'
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.goos }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest # by-exception (2026-07-04): needs Xcode/swiftc for the SE Swift shim — cgo cross-compilation not viable on household runner
            goos: darwin
          - runner: ubuntu-latest # by-exception (2026-07-04): cgo requires a native linux/amd64 sysroot (libpcsclite) — not viable on the NixOS household runner
            goos: linux
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Install PC/SC build deps (Linux go-piv/cgo backend)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpcsclite-dev

      - name: gofmt
        run: |
          out="$(gofmt -l ./cmd ./internal)"
          if [ -n "$out" ]; then
            echo "gofmt needs running on:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        run: CGO_ENABLED=1 go vet ./...

      - name: Test
        run: make test

      # by-exception (2026-07-04): public repo — GitHub cannot resolve the
      # private ntfy-failure composite action at job setup, so the equivalent
      # curl is inlined (matching the action's behaviour exactly).
      - name: Notify failure (ntfy infra)
        if: failure() && github.event_name != 'pull_request'
        env:
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS --max-time 10 \
            -H "Authorization: Bearer $NTFY_TOKEN" \
            -H "Title: signet: ci failed" \
            -H "Priority: 4" \
            -H "Tags: rotating_light" \
            -d "Run: $RUN_URL" \
            "https://ntfy.godswood.au/infra" \
            || echo "::warning::ntfy-failure: notification POST failed"
